<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chargeFUZE Virtual Open House 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0f1a;
      --surface: #111827;
      --border: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #00bfff;
      --accent-glow: rgba(0, 191, 255, 0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .logo span {
      font-weight: 400;
      color: var(--text);
    }
    .logo .bolt {
      color: var(--accent);
      margin-left: 2px;
    }
    .nav-badge {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0, 191, 255, 0.3);
      padding: 6px 16px;
      border-radius: 4px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
      max-width: 700px;
      margin: 0 auto;
    }
    .hero-label {
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .hero-label::before,
    .hero-label::after {
      content: '';
      width: 30px;
      height: 1px;
      background: var(--accent);
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 80px);
      line-height: 0.95;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    .hero p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 520px;
      margin: 0 auto;
    }

    /* CALENDLY SECTION */
    .calendly-section {
      max-width: 1000px;
      margin: 40px auto 0;
      padding: 0 20px 60px;
    }
    .calendly-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .calendly-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* Calendly inline widget */
    .calendly-inline-widget {
      min-width: 320px;
      height: 700px;
      border: none;
    }

    /* DETAILS */
    .details {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 20px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .details span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    footer .logo { font-size: 16px; }
    footer p {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    footer a {
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      .hero { padding: 60px 20px 30px; }
      .calendly-inline-widget { height: 900px; }
      .details { flex-direction: column; align-items: center; gap: 12px; }
      footer { flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      charge<span>FUZE</span> <span class="bolt">&#9889;</span>
    </div>
    <div class="nav-badge">Virtual Open House &middot; 2026</div>
  </nav>

  <section class="hero">
    <div class="hero-label">Reserve Your Seat</div>
    <h1>PICK YOUR DATE.<br>SHOW UP READY.</h1>
    <p>Sessions are capped to keep it personal. Pick a time below and you'll get a Google Meet link instantly via Calendly.</p>
  </section>

  <section class="calendly-section">
    <div class="calendly-wrapper">
      <div class="calendly-inline-widget" data-url="https://calendly.com/chris-okoye-chargefuze/chargefuze-virtual-open-house?hide_gdpr_banner=1&background_color=111827&text_color=f1f5f9&primary_color=00bfff"></div>
    </div>

    <div class="details">
      <span><span class="dot"></span> Google Meet</span>
      <span><span class="dot"></span> 60 Min</span>
      <span><span class="dot"></span> Free</span>
    </div>
  </section>

  <footer>
    <div class="logo">charge<span>FUZE</span> <span class="bolt">&#9889;</span></div>
    <p>&copy; 2026 chargeFUZE &middot; City Networks Program</p>
    <a href="https://www.chargefuze.com">Website</a>
  </footer>

  <!-- Calendly widget script -->
  <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
